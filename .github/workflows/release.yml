name: Release Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install @rollup/rollup-linux-x64-gnu --save-optional

      - name: Build extension
        run: npm run build:extension

      - name: Read manifest version
        id: manifest
        run: |
          version=$(node -p "require('./apps/extension/public/manifest.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: |
          mkdir -p release
          cd apps/extension/dist
          zip -r "../../../release/clapback-extension-v${{ steps.manifest.outputs.version }}.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: release/clapback-extension-v${{ steps.manifest.outputs.version }}.zip
